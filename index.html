<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WODiary</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-title"><span class="material-icons" style="font-size: 1.6rem;">fitness_center</span> WODiary</div>
        <button class="btn-lang" id="btn-lang-toggle" onclick="toggleLanguage()"><span class="material-icons" style="font-size: 1rem;">language</span> <span>ENG</span></button>
    </header>

    <main>
        <div id="view-home" class="view active">
            <div class="section-header">
                <span id="txt-month-summary">이번 달 요약</span>
                <button class="btn-export" id="txt-export-csv" onclick="exportToCSV()"><span class="material-icons" style="font-size:1rem;">download</span> 백업</button>
            </div>
            <div class="stats-container">
                <div class="stat-card"><div class="stat-value" id="stat-workout-days">0</div><div class="stat-label" id="txt-workout-days">Workout Days</div></div>
                <div class="stat-card"><div class="stat-value rest" id="stat-rest-days">0</div><div class="stat-label" id="txt-rest-days">Rest Days</div></div>
            </div>
            <div class="section-header" style="margin-top: 35px;"><span id="txt-recent-records">최근 기록</span></div>
            <div id="recent-workout-list"></div>
            <button class="btn-danger-outline" id="txt-btn-wipe" onclick="deleteAllData()"><span class="material-icons" style="font-size: 1.1rem;">delete_forever</span> 전체 데이터 초기화</button>
        </div>

        <div id="view-calendar" class="view">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)"><span class="material-icons">chevron_left</span></button>
                <span id="current-month-year"></span>
                <button onclick="changeMonth(1)"><span class="material-icons">chevron_right</span></button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <div style="margin-top:15px; display:flex; gap:15px; justify-content:center; font-size:0.8rem; color:var(--text-sub);">
                <span><span style="display:inline-block; width:8px; height:8px; border-radius:50%; border:2px solid var(--primary-color); vertical-align:middle; margin-right:4px;"></span>계획됨</span>
                <span><span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:var(--primary-color); vertical-align:middle; margin-right:4px;"></span>완료함</span>
            </div>
        </div>

        <div id="view-pr" class="view">
            <div class="calc-card">
                <div style="font-weight:800; color:var(--text-main); margin-bottom:12px; display:flex; align-items:center; gap:6px;" id="txt-1rm-calc"><span class="material-icons" style="color:var(--primary-color);">calculate</span> 1RM % 계산기</div>
                <input type="number" id="calc-input" oninput="calc1RM(this.value)" placeholder="1RM (예: 100)" style="width:100%; padding:12px; box-sizing:border-box; border-radius:10px; border:1px solid var(--border-color); background:var(--bg-color); color:var(--text-main); font-weight:bold;">
                <div class="calc-grid" id="calc-result"></div>
            </div>
            <div class="section-header"><span>Personal Records</span><button class="btn-action" id="txt-add-pr" onclick="openPRModal(-1)">+ ADD PR</button></div>
            <div id="pr-list-container"></div>
        </div>

        <div id="view-timer" class="view">
            <div class="section-header"><span>WOD Timer</span></div>
            <div class="timer-container" id="timer-box">
                <div class="form-group" style="margin-bottom: 10px; text-align:left;">
                    <label id="txt-timer-mode">모드 선택</label>
                    <select id="timer-type" onchange="changeTimerMode()">
                        <option value="up">For Time (스톱워치)</option>
                        <option value="down">AMRAP (카운트다운)</option>
                        <option value="interval">EMOM / Tabata</option>
                    </select>
                </div>
                <div class="timer-settings-row" id="timer-setting-down" style="display:none;">
                    <div class="form-group" style="flex:1;"><input type="number" id="t-down-min" placeholder="Min" value="10" min="0"></div>
                    <div class="form-group" style="flex:1;"><input type="number" id="t-down-sec" placeholder="Sec" value="0" min="0" max="59"></div>
                </div>
                <div class="timer-settings-row" id="timer-setting-interval" style="display:none;">
                    <div class="form-group" style="flex:1;"><label id="txt-int-work">WORK</label><input type="number" id="t-int-work" value="40" min="1"></div>
                    <div class="form-group" style="flex:1;"><label id="txt-int-rest">REST</label><input type="number" id="t-int-rest" value="20" min="0"></div>
                    <div class="form-group" style="flex:1;"><label id="txt-int-round">ROUND</label><input type="number" id="t-int-round" value="5" min="1"></div>
                </div>
                <div class="timer-phase" id="timer-phase-text"></div>
                <div class="timer-display" id="timer-display">00:00</div>
                <div class="timer-controls">
                    <button class="btn-start" id="btn-timer-start" onclick="startTimer()">START</button>
                    <button class="btn-stop" id="btn-timer-stop" onclick="stopTimer()">PAUSE</button>
                    <button class="btn-reset" id="btn-timer-reset" onclick="resetTimer()">RESET</button>
                </div>
                
                <div class="round-checker-box">
                    <div class="round-checker-title"><span class="material-icons">autorenew</span> ROUND CHECKER</div>
                    <div class="round-display-area">
                        <button class="btn-round" onclick="subRound()">-</button>
                        <div class="round-number" id="wod-round-count">0</div>
                        <button class="btn-round" onclick="addRound()">+</button>
                    </div>
                    <button class="btn-round-reset" onclick="resetRoundCount()">초기화 (Reset)</button>
                </div>

                <div class="today-plan-box" id="timer-today-plan"></div>
            </div>
        </div>
    </main>

    <nav>
        <a href="#" onclick="switchView('view-home', this)" class="active" id="nav-home"><i class="material-icons">home</i><span>HOME</span></a>
        <a href="#" onclick="switchView('view-calendar', this)" id="nav-calendar"><i class="material-icons">event_note</i><span>CALENDAR</span></a>
        <a href="#" onclick="switchView('view-pr', this)" id="nav-pr"><i class="material-icons">emoji_events</i><span>PR</span></a>
        <a href="#" onclick="switchView('view-timer', this)" id="nav-timer"><i class="material-icons">timer</i><span>TIMER</span></a>
    </nav>

    <div class="modal-overlay" id="record-modal">
        <div class="modal-content">
            <h3 id="modal-date-title" style="margin-top:0; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:15px; color:var(--primary-color);">날짜</h3>
            
            <div id="modal-list-view">
                <div id="workout-list"></div>
                <button class="btn btn-add" id="txt-btn-add-wod" onclick="openFormView(-1)">+ ADD PLAN / WORKOUT</button>
                <button class="btn btn-close" id="txt-btn-close" onclick="closeModal('record-modal')">CLOSE</button>
            </div>
            
            <div id="modal-form-view" style="display: none;">
                <div class="check-group">
                    <input type="checkbox" id="wod-completed">
                    <label for="wod-completed" id="txt-lbl-completed">운동 완료 (체크 해제 시 '계획'으로 저장)</label>
                </div>
                <div class="form-group"><label id="txt-lbl-type">분류</label>
                    <select id="wod-type">
                        <option value="AMRAP">AMRAP</option><option value="For Time">For Time</option>
                        <option value="EMOM">EMOM</option><option value="Strength">Strength (1RM/5RM)</option>
                        <option value="Rest">Rest (휴식)</option><option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group"><label id="txt-lbl-name">WOD / 동작</label><input type="text" id="wod-name" placeholder="Cindy, Back Squat..."></div>
                <div class="form-group"><label id="txt-lbl-score">기록 (Score/Weight)</label><input type="text" id="wod-score" placeholder="15R+5, 100kg..."></div>
                <div class="form-group"><label id="txt-lbl-memo">메모 / 목표</label><textarea id="wod-memo" placeholder="스케일링 목표, 다짐 등..."></textarea></div>
                <div class="form-group"><label id="txt-lbl-sticker">스티커 (완료 시 표시)</label>
                    <select id="wod-sticker">
                        <option value="">None (없음)</option>
                        <option value="star">★ PR / 신기록</option>
                        <option value="local_fire_department">🔥 고강도 / 불태움</option>
                        <option value="healing">🩹 부상 / 컨디션 난조</option>
                        <option value="water_drop">💧 리커버리</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button class="btn btn-cancel" id="txt-btn-back" onclick="showListView()">BACK</button>
                    <button class="btn btn-save" id="txt-btn-save1" onclick="saveWorkout()">SAVE</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="pr-modal">
        <div class="modal-content">
            <h3 id="txt-pr-modal-title" style="margin-top:0; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:15px; color:var(--primary-color);">PR 기록</h3>
            <div class="form-group"><label id="txt-pr-date">Date</label><input type="date" id="pr-input-date"></div>
            <div class="form-group"><label id="txt-pr-name">Movement</label><input type="text" id="pr-input-type" placeholder="Back Squat, Fran..."></div>
            <div class="form-group"><label id="txt-pr-record">Record</label><input type="text" id="pr-input-record" placeholder="100kg, 2:30..."></div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="txt-btn-cancel" onclick="closeModal('pr-modal')">CANCEL</button>
                <button class="btn btn-save" id="txt-btn-save2" onclick="savePR()">SAVE</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="timer.js"></script>
    <script src="ui.js"></script>
</body>
</html>
