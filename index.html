<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WODiary</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #121212; --surface-color: #1e1e1e; --surface-hover: #2c2c2c;
            --primary-color: #FF3B30; --text-main: #ffffff; --text-sub: #aaaaaa;
            --border-color: #333333; --rest-color: #4caf50; --rest-bg: #1b3320;
        }
        body { margin: 0; font-family: 'Montserrat', -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-color); color: var(--text-main); }
        header { background-color: #000000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 1.4rem; font-weight: 900; border-bottom: 1px solid var(--border-color); }
        header .header-title img { height: 1.8rem; width: auto; border-radius: 50%; vertical-align: middle; margin-right: 8px; }
        .header-title { display: flex; align-items: center; color: var(--primary-color); }
        .header-buttons { display: flex; gap: 10px; }
        .btn-header { background: transparent; border: 1px solid var(--text-sub); color: var(--text-sub); border-radius: 8px; padding: 6px 10px; font-size: 0.8rem; cursor: pointer; font-weight: bold; display:flex; align-items:center; gap:4px;}
        
        main { flex: 1; overflow-y: auto; padding: 15px; position: relative; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; transition: opacity 0.5s, visibility 0.5s; }
        #login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-title { font-size: 3rem; font-weight: 900; color: var(--primary-color); margin-bottom: 10px; display:flex; align-items:center; gap:10px; }
        .login-form { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .login-form input { padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--surface-color); color: white; font-size: 1rem; }
        .btn-login { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; }
        .btn-signup { background: transparent; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        .section-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; }
        .stats-container { display: flex; gap: 12px; margin-bottom: 25px; }
        .stat-card { background: var(--surface-color); flex: 1; padding: 20px; border-radius: 16px; text-align: center; border: 1px solid var(--border-color); }
        .stat-value { font-size: 2.2rem; font-weight: 900; color: var(--primary-color); }
        .stat-label { font-size: 0.85rem; color: var(--text-sub); margin-top: 5px; }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .calendar-day { background: var(--surface-color); padding: 15px 0; border-radius: 12px; cursor: pointer; position: relative; min-height: 50px; display: flex; justify-content: center; align-items: center; }
        .calendar-day.today { border: 2px solid var(--primary-color); }
        .has-record::after { content: ''; width: 6px; height: 6px; background: var(--primary-color); border-radius: 50%; position: absolute; bottom: 8px; }

        nav { display: flex; justify-content: space-around; background-color: #000000; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); }
        nav a { text-decoration: none; color: var(--text-sub); text-align: center; padding: 12px 0; flex: 1; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        nav a.active { color: var(--primary-color); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--surface-color); width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; max-height: 85vh; overflow-y: auto; }
        
        .workout-item { background: var(--bg-color); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .btn-action { background: var(--primary-color); color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-danger-outline { background: transparent; color: var(--primary-color); border: 1px solid var(--primary-color); width: 100%; padding: 12px; border-radius: 12px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-title"><img src="wodiary_logo.png" style="height:3rem;"> WODiary</div>
        <div class="login-form">
            <input type="email" id="auth-email" placeholder="이메일">
            <input type="password" id="auth-password" placeholder="비밀번호">
            <button class="btn-login" onclick="loginUser()">로그인</button>
            <button class="btn-signup" onclick="signUpUser()">회원가입</button>
        </div>
    </div>

    <header>
        <div class="header-title"><img src="wodiary_logo.png"> WODiary</div>
        <div class="header-buttons">
            <button class="btn-header" onclick="logoutUser()"><span class="material-icons">logout</span> LOGOUT</button>
        </div>
    </header>

    <main>
        <div id="view-home" class="view active">
            <div class="section-header">이번 달 요약</div>
            <div class="stats-container">
                <div class="stat-card"><div class="stat-value" id="stat-workout-days">0</div><div class="stat-label">Workout Days</div></div>
                <div class="stat-card"><div class="stat-value" style="color:var(--rest-color)" id="stat-rest-days">0</div><div class="stat-label">Rest Days</div></div>
            </div>
            <div class="section-header">최근 기록</div>
            <div id="recent-workout-list"></div>
            <button class="btn-danger-outline" onclick="deleteAllData()">전체 데이터 초기화</button>
        </div>

        <div id="view-calendar" class="view">
            <div class="calendar-header">
                <button class="btn-header" onclick="changeMonth(-1)"><span class="material-icons">chevron_left</span></button>
                <span id="current-month-year" style="font-weight:800; font-size:1.2rem;"></span>
                <button class="btn-header" onclick="changeMonth(1)"><span class="material-icons">chevron_right</span></button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>
    </main>

    <nav>
        <a href="#" onclick="switchView('view-home', this)" class="active"><i class="material-icons">home</i>HOME</a>
        <a href="#" onclick="switchView('view-calendar', this)"><i class="material-icons">event_note</i>CALENDAR</a>
    </nav>

    <div class="modal-overlay" id="record-modal">
        <div class="modal-content">
            <h3 id="modal-date-title" style="color:var(--primary-color); margin-top:0;">날짜</h3>
            <div id="workout-list"></div>
            <button class="btn-action" style="width:100%; margin-top:10px;" onclick="openFormView()">+ 기록 추가</button>
            <button class="btn-header" style="width:100%; margin-top:10px; justify-content:center;" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <div class="modal-overlay" id="form-modal">
        <div class="modal-content">
            <h3>기록하기</h3>
            <input type="text" id="wod-name" placeholder="운동 이름 (예: Cindy)" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333;">
            <input type="text" id="wod-score" placeholder="기록 (예: 20 rounds)" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333;">
            <button class="btn-action" style="width:100%;" onclick="saveWorkout()">저장</button>
            <button class="btn-header" style="width:100%; margin-top:10px; justify-content:center;" onclick="document.getElementById('form-modal').classList.remove('active')">취소</button>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const supabaseClient = createClient('https://ngenrfzcocnusrvbuupb.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nZW5yZnpjb2NudXNydmJ1dXBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTY1MTcsImV4cCI6MjA4ODgzMjUxN30.vNmP_ORgKgrVuM77wBFBHfCLw-gWaV9LuUqMq7o0rpw');

        window.workoutData = {};
        window.currentUser = null;
        let currentDate = new Date();
        let selectedDate = "";

        // 인증 로직
        async function loginUser() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if(error) alert("로그인 실패: " + error.message);
        }

        async function signUpUser() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if(error) alert("가입 실패: " + error.message); else alert("가입 성공! 로그인 해주세요.");
        }

        async function logoutUser() {
            await supabaseClient.auth.signOut();
            window.location.reload(); 
        }

        // 상태 변경 감지
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                window.currentUser = session.user;
                document.getElementById('login-overlay').classList.add('hidden');
                await loadData();
                renderAll();
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
            }
        });

        // 데이터 로드
        async function loadData() {
            if (!window.currentUser) return;
            const { data, error } = await supabaseClient.from('user_data').select('*').eq('user_id', window.currentUser.id).single();
            if (data) window.workoutData = data.workout_data || {};
        }

        // 데이터 저장
        async function saveData() {
            await supabaseClient.from('user_data').upsert({ 
                user_id: window.currentUser.id, 
                workout_data: window.workoutData,
                updated_at: new Date()
            });
            await loadData(); // 저장 후 즉시 최신 데이터 다시 불러오기
            renderAll();
        }

        // 뷰 전환
        async function switchView(id, el) {
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            await loadData(); // 화면 전환할 때마다 데이터 동기화
            renderAll();
        }

        function renderAll() {
            renderDashboard();
            renderCalendar();
        }

        function renderDashboard() {
            const list = document.getElementById('recent-workout-list');
            list.innerHTML = "";
            let wCount = 0;
            const all = [];
            for(let date in window.workoutData) {
                window.workoutData[date].forEach(w => all.push({date, ...w}));
                wCount++;
            }
            document.getElementById('stat-workout-days').innerText = wCount;
            all.sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,5).forEach(w => {
                list.innerHTML += `<div class="workout-item"><div><strong>${w.date}</strong><br>${w.name}</div><div>${w.score}</div></div>`;
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";
            const y = currentDate.getFullYear();
            const m = currentDate.getMonth();
            document.getElementById('current-month-year').innerText = `${y}년 ${m+1}월`;

            const firstDay = new Date(y, m, 1).getDay();
            const lastDate = new Date(y, m+1, 0).getDate();

            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
            for(let i=1; i<=lastDate; i++) {
                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasData = window.workoutData[dateStr] && window.workoutData[dateStr].length > 0;
                grid.innerHTML += `<div class="calendar-day ${hasData?'has-record':''}" onclick="openDateModal('${dateStr}')">${i}</div>`;
            }
        }

        function changeMonth(val) {
            currentDate.setMonth(currentDate.getMonth() + val);
            renderCalendar();
        }

        function openDateModal(date) {
            selectedDate = date;
            document.getElementById('modal-date-title').innerText = date;
            const list = document.getElementById('workout-list');
            list.innerHTML = "";
            (window.workoutData[date] || []).forEach((w, idx) => {
                list.innerHTML += `<div class="workout-item"><div>${w.name}: ${w.score}</div><button onclick="deleteWorkout(${idx})">삭제</button></div>`;
            });
            document.getElementById('record-modal').classList.add('active');
        }

        function openFormView() {
            document.getElementById('form-modal').classList.add('active');
        }

        async function saveWorkout() {
            const name = document.getElementById('wod-name').value;
            const score = document.getElementById('wod-score').value;
            if(!name) return;
            if(!window.workoutData[selectedDate]) window.workoutData[selectedDate] = [];
            window.workoutData[selectedDate].push({name, score});
            await saveData();
            document.getElementById('form-modal').classList.remove('active');
            openDateModal(selectedDate);
        }

        async function deleteWorkout(idx) {
            window.workoutData[selectedDate].splice(idx, 1);
            await saveData();
            openDateModal(selectedDate);
        }

        function closeModal() {
            document.getElementById('record-modal').classList.remove('active');
        }

        async function deleteAllData() {
            if(confirm("정말 모든 데이터를 삭제할까요?")) {
                window.workoutData = {};
                await saveData();
            }
        }
    </script>
</body>
</html>
