<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WODiary</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-color: #121212; --surface-color: #1e1e1e; --surface-hover: #2c2c2c;
            --primary-color: #FF3B30; --text-main: #ffffff; --text-sub: #aaaaaa;
            --border-color: #333333; --rest-color: #4caf50; --rest-bg: #1b3320;
        }

        body { margin: 0; font-family: 'Montserrat', -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; background-color: var(--bg-color); color: var(--text-main); }
        header { background-color: #000000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 1.4rem; font-weight: 900; letter-spacing: -0.5px; border-bottom: 1px solid var(--border-color); }
        header .header-title img { height: 1.8rem; width: auto; border-radius: 50%; vertical-align: middle; margin-right: 8px; }
        .header-title { display: flex; align-items: center; color: var(--primary-color); }
        .header-buttons { display: flex; gap: 10px; }
        .btn-header { background: transparent; border: 1px solid var(--text-sub); color: var(--text-sub); border-radius: 8px; padding: 6px 10px; font-size: 0.8rem; cursor: pointer; font-weight: bold; font-family: 'Montserrat'; display:flex; align-items:center; gap:4px;}
        .btn-header:active { transform: scale(0.95); }

        main { flex: 1; overflow-y: auto; padding: 15px; position: relative; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 로그인 오버레이 */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; transition: opacity 0.5s, visibility 0.5s; }
        #login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-title { font-size: 3.5rem; font-weight: 900; color: var(--primary-color); display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .login-desc { color: var(--text-sub); margin-bottom: 40px; font-size: 1rem; }
        .login-form { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .login-form input { padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--surface-color); color: white; font-size: 1rem; font-family: 'Montserrat'; }
        .btn-login { background: var(--primary-color); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: transform 0.1s; }
        .btn-login:active { transform: scale(0.98); }
        .btn-signup { background: transparent; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; }

        /* 공통 UI */
        .section-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: 800; margin-bottom: 15px; color: var(--text-main); }
        .btn-action { background: var(--primary-color); color: white; border: none; padding: 10px 16px; border-radius: 12px; font-size: 0.9rem; cursor: pointer; font-weight: bold; }
        
        /* 대시보드 */
        .stats-container { display: flex; gap: 12px; margin-bottom: 25px; }
        .stat-card { background: var(--surface-color); flex: 1; padding: 20px; border-radius: 16px; text-align: center; border: 1px solid var(--border-color); }
        .stat-value { font-size: 2.2rem; font-weight: 900; color: var(--primary-color); }
        .stat-value.rest { color: var(--rest-color); }
        .stat-label { font-size: 0.85rem; color: var(--text-sub); margin-top: 5px; font-weight: 600; }
        
        /* 달력 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 1.3rem; font-weight: 800; }
        .calendar-header button { background: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .day-name { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 5px; font-weight: 600; }
        .calendar-day { background: var(--surface-color); padding: 15px 0; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: 600; position: relative; height: 30px; display: flex; justify-content: center; align-items: center; border: 1px solid transparent; }
        .calendar-day.empty { background: transparent; box-shadow: none; cursor: default; }
        .calendar-day.today { border: 2px solid var(--primary-color); color: var(--primary-color); }
        .has-record::after { content: ''; display: block; width: 6px; height: 6px; background-color: var(--primary-color); border-radius: 50%; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); }
        .has-plan::after { content: ''; display: block; width: 6px; height: 6px; border: 2px solid var(--primary-color); box-sizing: border-box; border-radius: 50%; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); }
        .calendar-day.is-rest { background-color: var(--rest-bg); border: 1px solid var(--rest-color); color: var(--rest-color); }
        .day-sticker { position: absolute; bottom: 2px; font-size: 1rem; color: #ffeb3b; }

        /* PR UI */
        .calc-card { background: var(--surface-color); padding: 20px; border-radius: 16px; margin-bottom: 25px; border-top: 4px solid var(--primary-color);}
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; text-align: center; font-size: 0.95rem; font-weight: bold;}
        .calc-grid div { background: var(--bg-color); padding: 10px 0; border-radius: 8px; border: 1px solid var(--border-color);}
        .pr-item { background: var(--surface-color); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
        .pr-item-content { flex: 1; cursor: pointer; }
        .pr-header { display: flex; justify-content: space-between; font-weight: 800; font-size: 1.15rem; margin-bottom: 4px;}
        .pr-record-val { color: var(--primary-color); font-size: 1.25rem; }
        .pr-date { font-size: 0.8rem; color: var(--text-sub); }

        /* 타이머 & 라운드 체커 */
        .timer-container { background: var(--surface-color); border-radius: 20px; padding: 25px 20px; text-align: center; margin-top: 10px; border: 1px solid var(--border-color); transition: background 0.3s;}
        .timer-display { font-size: 5.5rem; font-weight: 900; color: var(--text-main); margin: 10px 0 20px 0; letter-spacing: -2px; }
        .timer-phase { font-size: 1.3rem; font-weight: 800; color: var(--text-sub); height: 1.5rem; }
        .timer-controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 10px; }
        .timer-controls button { padding: 16px 0; flex: 1; font-size: 1.1rem; font-weight: 900; border-radius: 12px; border: none; cursor: pointer; color: white; }
        .btn-start { background-color: var(--primary-color); }
        .btn-stop { background-color: #ff9800; display: none; }
        .btn-reset { background-color: #555; }
        .timer-settings-row { display: flex; gap: 10px; margin-top: 15px; }
        .timer-container.work-phase { background-color: #1a2e1e; border-color: #4caf50; } 
        .timer-container.work-phase .timer-display { color: #4caf50; }
        .timer-container.rest-phase { background-color: #3b1818; border-color: #e53935; } 
        .timer-container.rest-phase .timer-display { color: #e53935; }
        
        .round-checker-box { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; margin-top: 20px; text-align: center; }
        .round-checker-title { font-size: 1rem; font-weight: 800; color: var(--primary-color); margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .round-display-area { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 15px; }
        .round-number { font-size: 4rem; font-weight: 900; color: var(--text-main); width: 80px; text-align: center; font-variant-numeric: tabular-nums; line-height: 1; }
        .btn-round { background: var(--surface-color); color: var(--text-main); border: 2px solid var(--border-color); width: 60px; height: 60px; border-radius: 50%; font-size: 2.5rem; font-weight: 900; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.1s; }
        .btn-round:active { transform: scale(0.9); background: var(--primary-color); border-color: var(--primary-color); color: white; }
        .btn-round-reset { background: transparent; color: var(--text-sub); border: none; font-size: 0.85rem; font-weight: 800; cursor: pointer; text-decoration: underline; padding: 5px; }

        .today-plan-box { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 16px; padding: 15px; margin-top: 20px; text-align: left;}
        .today-plan-header { font-size: 1rem; font-weight: 800; color: var(--primary-color); margin-bottom: 10px; display: flex; align-items: center; gap: 5px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;}
        .today-plan-item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--border-color); }
        .today-plan-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
        .tp-title { font-weight: 800; font-size: 1.05rem; margin-bottom: 4px; color: var(--text-main); }
        .tp-memo { font-size: 0.85rem; color: var(--text-sub); line-height: 1.4; }

        nav { display: flex; justify-content: space-around; background-color: #000000; border-top: 1px solid var(--border-color); padding-bottom: env(safe-area-inset-bottom); }
        nav a { text-decoration: none; color: var(--text-sub); text-align: center; padding: 12px 0; flex: 1; font-size: 0.75rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.2s; }
        nav a.active { color: var(--primary-color); }

        /* 모달창 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(3px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--surface-color); width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; box-sizing: border-box; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border-color); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-sub); margin-bottom: 6px; font-weight: 700;}
        .form-group input[type="text"], .form-group input[type="date"], .form-group input[type="number"], .form-group select, .form-group textarea { width: 100%; padding: 12px; background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 10px; box-sizing: border-box; font-size: 1rem; font-family: 'Montserrat', sans-serif; }
        
        .check-group { display: flex; align-items: center; gap: 10px; background: rgba(255, 59, 48, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 59, 48, 0.3); margin-bottom: 18px;}
        .check-group input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--primary-color); cursor: pointer; }
        .check-group label { margin: 0; color: var(--primary-color); font-size: 0.95rem; font-weight: 800; cursor: pointer; }

        .modal-buttons { display: flex; gap: 10px; margin-top: 25px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 800; cursor: pointer; }
        .btn-cancel { background: #333; color: var(--text-main); }
        .btn-save { background: var(--primary-color); color: white; }
        
        .workout-item { background: var(--surface-color); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; position: relative; }
        .workout-item-content { flex: 1; cursor: pointer; }
        .workout-item.rest-item { border-left: 4px solid var(--rest-color); } 
        .workout-item-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 4px; color: var(--text-main); display: flex; align-items: center; gap: 6px;}
        .workout-item-desc { font-size: 0.85rem; color: var(--text-sub); }
        .item-sticker { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 50%; width: 24px; height: 24px; margin-left: 8px; font-size: 0.9rem;}
        
        .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; letter-spacing: -0.5px; }
        .status-plan { background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); }
        .status-done { background: var(--primary-color); color: white; }

        .btn-add { background: transparent; color: var(--primary-color); border: 2px dashed var(--primary-color); width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-bottom: 15px; font-size: 1rem;}
        .btn-close { background: #222; color: var(--text-sub); width: 100%; margin-top: 10px; border: 1px solid var(--border-color); }
        .btn-icon-delete { background: transparent; border: none; color: #777; cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-danger-outline { background: transparent; color: var(--primary-color); border: 1px solid var(--primary-color); padding: 12px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 30px; font-size: 0.9rem; display:flex; justify-content:center; align-items:center; gap:6px;}
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-title"><img src="wodiary_logo.png" style="height: 4rem; border-radius: 50%; box-shadow: 0 4px 10px rgba(255,59,48,0.3);" alt="로고"> WODiary</div>
        <div class="login-desc">나만의 크로스핏 다이어리</div>
        <div class="login-form">
            <input type="email" id="auth-email" placeholder="이메일 주소">
            <input type="password" id="auth-password" placeholder="비밀번호 (6자리 이상)">
            <button class="btn-login" onclick="loginUser()">로그인</button>
            <button class="btn-signup" onclick="signUpUser()">회원가입</button>
        </div>
    </div>

    <header>
        <div class="header-title"><img src="wodiary_logo.png" alt="로고"> WODiary</div>
        <div class="header-buttons">
            <button class="btn-header" id="btn-lang-toggle" onclick="toggleLanguage()"><span class="material-icons" style="font-size: 1rem;">language</span> <span>ENG</span></button>
            <button class="btn-header" onclick="logoutUser()"><span class="material-icons" style="font-size: 1rem;">logout</span></button>
        </div>
    </header>

    <main>
        <div id="view-home" class="view active">
            <div class="section-header"><span id="txt-month-summary">이번 달 요약</span></div>
            <div class="stats-container">
                <div class="stat-card"><div class="stat-value" id="stat-workout-days">0</div><div class="stat-label" id="txt-workout-days">Workout Days</div></div>
                <div class="stat-card"><div class="stat-value rest" id="stat-rest-days">0</div><div class="stat-label" id="txt-rest-days">Rest Days</div></div>
            </div>
            <div class="section-header" style="margin-top: 35px;"><span id="txt-recent-records">최근 기록</span></div>
            <div id="recent-workout-list"></div>
            <button class="btn-danger-outline" onclick="deleteAllData()"><span class="material-icons" style="font-size: 1.1rem;">delete_forever</span> 내 데이터 초기화</button>
        </div>

        <div id="view-calendar" class="view">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)"><span class="material-icons">chevron_left</span></button>
                <span id="current-month-year"></span>
                <button onclick="changeMonth(1)"><span class="material-icons">chevron_right</span></button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <div style="margin-top:15px; display:flex; gap:15px; justify-content:center; font-size:0.8rem; color:var(--text-sub);">
                <span><span style="display:inline-block; width:8px; height:8px; border-radius:50%; border:2px solid var(--primary-color); vertical-align:middle; margin-right:4px;"></span>계획됨</span>
                <span><span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:var(--primary-color); vertical-align:middle; margin-right:4px;"></span>완료함</span>
            </div>
        </div>

        <div id="view-pr" class="view">
            <div class="calc-card">
                <div style="font-weight:800; color:var(--text-main); margin-bottom:12px; display:flex; align-items:center; gap:6px;" id="txt-1rm-calc"><span class="material-icons" style="color:var(--primary-color);">calculate</span> 1RM % 계산기</div>
                <input type="number" id="calc-input" oninput="calc1RM(this.value)" placeholder="1RM (예: 100)" style="width:100%; padding:12px; box-sizing:border-box; border-radius:10px; border:1px solid var(--border-color); background:var(--bg-color); color:var(--text-main); font-weight:bold;">
                <div class="calc-grid" id="calc-result"></div>
            </div>
            <div class="section-header"><span>Personal Records</span><button class="btn-action" id="txt-add-pr" onclick="openPRModal(-1)">+ ADD PR</button></div>
            <div id="pr-list-container"></div>
        </div>

        <div id="view-timer" class="view">
            <div class="section-header"><span>WOD Timer</span></div>
            <div class="timer-container" id="timer-box">
                <div class="form-group" style="margin-bottom: 10px; text-align:left;">
                    <label id="txt-timer-mode">모드 선택</label>
                    <select id="timer-type" onchange="changeTimerMode()">
                        <option value="up">For Time (스톱워치)</option>
                        <option value="down">AMRAP (카운트다운)</option>
                        <option value="interval">EMOM / Tabata</option>
                    </select>
                </div>
                <div class="timer-settings-row" id="timer-setting-down" style="display:none;">
                    <div class="form-group" style="flex:1;"><input type="number" id="t-down-min" placeholder="Min" value="10" min="0"></div>
                    <div class="form-group" style="flex:1;"><input type="number" id="t-down-sec" placeholder="Sec" value="0" min="0" max="59"></div>
                </div>
                <div class="timer-settings-row" id="timer-setting-interval" style="display:none;">
                    <div class="form-group" style="flex:1;"><label id="txt-int-work">WORK</label><input type="number" id="t-int-work" value="40" min="1"></div>
                    <div class="form-group" style="flex:1;"><label id="txt-int-rest">REST</label><input type="number" id="t-int-rest" value="20" min="0"></div>
                    <div class="form-group" style="flex:1;"><label id="txt-int-round">ROUND</label><input type="number" id="t-int-round" value="5" min="1"></div>
                </div>
                <div class="timer-phase" id="timer-phase-text"></div>
                <div class="timer-display" id="timer-display">00:00</div>
                <div class="timer-controls">
                    <button class="btn-start" id="btn-timer-start" onclick="startTimer()">START</button>
                    <button class="btn-stop" id="btn-timer-stop" onclick="stopTimer()">PAUSE</button>
                    <button class="btn-reset" id="btn-timer-reset" onclick="resetTimer()">RESET</button>
                </div>
                
                <div class="round-checker-box">
                    <div class="round-checker-title"><span class="material-icons">autorenew</span> ROUND CHECKER</div>
                    <div class="round-display-area">
                        <button class="btn-round" onclick="subRound()">-</button>
                        <div class="round-number" id="wod-round-count">0</div>
                        <button class="btn-round" onclick="addRound()">+</button>
                    </div>
                    <button class="btn-round-reset" onclick="resetRoundCount()">초기화 (Reset)</button>
                </div>

                <div class="today-plan-box" id="timer-today-plan"></div>
            </div>
        </div>
    </main>

    <nav>
        <a href="#" onclick="switchView('view-home', this)" class="active" id="nav-home"><i class="material-icons">home</i><span>HOME</span></a>
        <a href="#" onclick="switchView('view-calendar', this)" id="nav-calendar"><i class="material-icons">event_note</i><span>CALENDAR</span></a>
        <a href="#" onclick="switchView('view-pr', this)" id="nav-pr"><i class="material-icons">emoji_events</i><span>PR</span></a>
        <a href="#" onclick="switchView('view-timer', this)" id="nav-timer"><i class="material-icons">timer</i><span>TIMER</span></a>
    </nav>

    <div class="modal-overlay" id="record-modal">
        <div class="modal-content">
            <h3 id="modal-date-title" style="margin-top:0; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:15px; color:var(--primary-color);">날짜</h3>
            <div id="modal-list-view">
                <div id="workout-list"></div>
                <button class="btn btn-add" id="txt-btn-add-wod" onclick="openFormView(-1)">+ ADD PLAN / WORKOUT</button>
                <button class="btn btn-close" id="txt-btn-close" onclick="closeModal('record-modal')">CLOSE</button>
            </div>
            <div id="modal-form-view" style="display: none;">
                <div class="check-group">
                    <input type="checkbox" id="wod-completed">
                    <label for="wod-completed" id="txt-lbl-completed">운동 완료 (체크 해제 시 '계획'으로 저장)</label>
                </div>
                <div class="form-group"><label id="txt-lbl-type">분류</label>
                    <select id="wod-type">
                        <option value="AMRAP">AMRAP</option><option value="For Time">For Time</option>
                        <option value="EMOM">EMOM</option><option value="Strength">Strength (1RM/5RM)</option>
                        <option value="Rest">Rest (휴식)</option><option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group"><label id="txt-lbl-name">WOD / 동작</label><input type="text" id="wod-name" placeholder="Cindy, Back Squat..."></div>
                <div class="form-group"><label id="txt-lbl-score">기록 (Score/Weight)</label><input type="text" id="wod-score" placeholder="15R+5, 100kg..."></div>
                <div class="form-group"><label id="txt-lbl-memo">메모 / 목표</label><textarea id="wod-memo" placeholder="스케일링 목표, 다짐 등..."></textarea></div>
                <div class="form-group"><label id="txt-lbl-sticker">스티커 (완료 시 표시)</label>
                    <select id="wod-sticker">
                        <option value="">None (없음)</option><option value="star">★ PR / 신기록</option><option value="local_fire_department">🔥 고강도 / 불태움</option><option value="healing">🩹 부상 / 컨디션 난조</option><option value="water_drop">💧 리커버리</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button class="btn btn-cancel" id="txt-btn-back" onclick="showListView()">BACK</button>
                    <button class="btn btn-save" id="txt-btn-save1" onclick="saveWorkout()">SAVE</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="pr-modal">
        <div class="modal-content">
            <h3 id="txt-pr-modal-title" style="margin-top:0; margin-bottom:20px; border-bottom:1px solid var(--border-color); padding-bottom:15px; color:var(--primary-color);">PR 기록</h3>
            <div class="form-group"><label id="txt-pr-date">Date</label><input type="date" id="pr-input-date"></div>
            <div class="form-group"><label id="txt-pr-name">Movement</label><input type="text" id="pr-input-type" placeholder="Back Squat, Fran..."></div>
            <div class="form-group"><label id="txt-pr-record">Record</label><input type="text" id="pr-input-record" placeholder="100kg, 2:30..."></div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="txt-btn-cancel" onclick="closeModal('pr-modal')">CANCEL</button>
                <button class="btn btn-save" id="txt-btn-save2" onclick="savePR()">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 전역 변수 & 언어 설정
        // ==========================================
        let workoutData = {};
        let prDataList = [];
        let currentUser = null;
        let currentDate = new Date();
        let selectedDateString = "";
        let currentEditIndex = -1;
        let currentPrIndex = -1;

        const i18n = {
            ko: { langFlag: "ENG", navHome: "HOME", navCalendar: "CALENDAR", navPr: "PR", navTimer: "TIMER", monthSummary: "이번 달 요약", txtDone: "완료", txtPlan: "계획", alertDel: "삭제할까요?", alertPrIncomplete: "모두 입력해주세요", alertAutoPr: "달력에 추가됨!", todayPlanTitle: "오늘의 계획", noPlanToday: "계획 없음", noRecord: "기록 없음" },
            en: { langFlag: "KOR", navHome: "HOME", navCalendar: "CALENDAR", navPr: "PR", navTimer: "TIMER", monthSummary: "Summary", txtDone: "Done", txtPlan: "Plan", alertDel: "Delete?", alertPrIncomplete: "Fill fields", alertAutoPr: "Added!", todayPlanTitle: "Today's Plan", noPlanToday: "No Plan", noRecord: "No Record" }
        };
        let currentLang = localStorage.getItem('crossfit_lang') || 'ko';

        // ==========================================
        // 2. UI 렌더링 함수들 (가장 먼저 정의되어야 함)
        // ==========================================
        function applyLanguage() { document.getElementById('btn-lang-toggle').innerHTML = `<span class="material-icons" style="font-size:1rem;">language</span> <span>${i18n[currentLang].langFlag}</span>`; }
        function toggleLanguage() { currentLang = currentLang === 'ko' ? 'en' : 'ko'; localStorage.setItem('crossfit_lang', currentLang); applyLanguage(); renderAll(); }
        
        function switchView(targetId, element) {
            document.querySelectorAll('nav a').forEach(n => n.classList.remove('active')); element.classList.add('active');
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(targetId).classList.add('active');
            renderAll();
        }

        function renderAll() {
            renderDashboard(); renderCalendar(); renderPRs(); renderTimerPlan();
        }

        function renderDashboard() {
            const y = currentDate.getFullYear(); const mStr = String(currentDate.getMonth() + 1).padStart(2, '0');
            let wCount = 0, rCount = 0, all = [];
            for (const d in workoutData) {
                if (d.startsWith(`${y}-${mStr}`) && workoutData[d].length > 0) {
                    if (workoutData[d].some(r => r.isCompleted && r.type !== 'Rest')) wCount++;
                    if (workoutData[d].some(r => r.isCompleted && r.type === 'Rest')) rCount++;
                }
                workoutData[d].forEach(r => all.push({ date: d, ...r }));
            }
            document.getElementById('stat-workout-days').innerText = wCount; document.getElementById('stat-rest-days').innerText = rCount;
            
            all.sort((a, b) => new Date(b.date) - new Date(a.date));
            const cont = document.getElementById('recent-workout-list'); cont.innerHTML = '';
            if (all.slice(0, 4).length === 0) cont.innerHTML = `<p style="text-align:center; color:#aaa;">${i18n[currentLang].noRecord}</p>`;
            else all.slice(0, 4).forEach(r => {
                const div = document.createElement('div'); div.className = 'workout-item';
                const st = r.sticker && r.isCompleted ? `<span class="item-sticker"><span class="material-icons" style="color:var(--primary-color);">${r.sticker}</span></span>` : '';
                const badge = r.isCompleted ? `<span class="status-badge status-done">${i18n[currentLang].txtDone}</span>` : `<span class="status-badge status-plan">${i18n[currentLang].txtPlan}</span>`;
                div.innerHTML = `<div class="workout-item-title">${r.date} ${badge}</div><div class="workout-item-desc">${r.type} ${r.name?'- '+r.name:''}</div>${st}`;
                div.onclick = () => { document.querySelector('[data-target="view-calendar"]').click(); openDateModal(r.date); }; cont.appendChild(div);
            });
        }

        function changeMonth(val) { currentDate.setMonth(currentDate.getMonth() + val); renderCalendar(); renderDashboard(); }
        
        function renderCalendar() {
            const y = currentDate.getFullYear(), m = currentDate.getMonth(); document.getElementById('current-month-year').innerText = `${y}년 ${m + 1}월`;
            const firstDay = new Date(y, m, 1).getDay(), daysInMonth = new Date(y, m + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            ['일','월','화','수','목','금','토'].forEach(d => { grid.innerHTML += `<div class="day-name">${d}</div>`; });
            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="calendar-day empty"></div>`;
            const today = new Date();
            for (let i = 1; i <= daysInMonth; i++) {
                const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                let cls = 'calendar-day', inr = i;
                if (y === today.getFullYear() && m === today.getMonth() && i === today.getDate()) cls += ' today';
                if (workoutData[dStr] && workoutData[dStr].length > 0) {
                    let isR=false, hasD=false, hasP=false, stk=null;
                    workoutData[dStr].forEach(r => { if(r.type==='Rest') isR=true; if(r.isCompleted) { hasD=true; if(r.sticker) stk=r.sticker; } else hasP=true; });
                    if (isR && hasD) cls += ' is-rest'; else if (stk) inr = `<span style="position:absolute; top:5px;">${i}</span><span class="day-sticker material-icons">${stk}</span>`;
                    else if (hasD) cls += ' has-record'; else if (hasP) cls += ' has-plan';
                }
                grid.innerHTML += `<div class="${cls}" onclick="openDateModal('${dStr}')">${inr}</div>`;
            }
        }

        function openDateModal(d) { selectedDateString = d; document.getElementById('modal-date-title').innerText = d; renderWorkoutList(); showListView(); document.getElementById('record-modal').classList.add('active'); }
        function showListView() { document.getElementById('modal-list-view').style.display = 'block'; document.getElementById('modal-form-view').style.display = 'none'; }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        function renderWorkoutList() {
            const c = document.getElementById('workout-list'); c.innerHTML = ''; const recs = workoutData[selectedDateString] || [];
            if (recs.length === 0) c.innerHTML = `<p style="text-align:center; color:#aaa;">${i18n[currentLang].noRecord}</p>`;
            else recs.forEach((r, i) => {
                const st = r.sticker && r.isCompleted ? `<span class="item-sticker"><span class="material-icons">${r.sticker}</span></span>` : '';
                const badge = r.isCompleted ? `<span class="status-badge status-done">${i18n[currentLang].txtDone}</span>` : `<span class="status-badge status-plan">${i18n[currentLang].txtPlan}</span>`;
                c.innerHTML += `<div class="workout-item"><div class="workout-item-content" onclick="openFormView(${i})"><div class="workout-item-title">${r.type} ${badge}</div><div class="workout-item-desc">${r.name||''} ${r.score||''}</div>${st}</div><button class="btn-icon-delete" onclick="deleteWorkoutDirect(${i}, event)"><span class="material-icons">delete</span></button></div>`;
            });
        }

        function openFormView(idx) {
            currentEditIndex = idx; document.getElementById('modal-list-view').style.display = 'none'; document.getElementById('modal-form-view').style.display = 'block';
            if (idx > -1) {
                const r = workoutData[selectedDateString][idx]; document.getElementById('wod-completed').checked = r.isCompleted;
                ['type', 'name', 'score', 'memo', 'sticker'].forEach(k => document.getElementById(`wod-${k}`).value = r[k] || '');
            } else {
                document.getElementById('wod-completed').checked = true; ['name', 'score', 'memo', 'sticker'].forEach(k => document.getElementById(`wod-${k}`).value = ''); document.getElementById('wod-type').value = 'AMRAP';
            }
        }

        function saveWorkout() {
            const r = { isCompleted: document.getElementById('wod-completed').checked, type: document.getElementById('wod-type').value, name: document.getElementById('wod-name').value, score: document.getElementById('wod-score').value, memo: document.getElementById('wod-memo').value, sticker: document.getElementById('wod-sticker').value };
            if (!workoutData[selectedDateString]) workoutData[selectedDateString] = [];
            if (currentEditIndex > -1) workoutData[selectedDateString][currentEditIndex] = r; else workoutData[selectedDateString].push(r);
            updateAndSync();
        }

        function deleteWorkoutDirect(idx, e) { e.stopPropagation(); if(confirm(i18n[currentLang].alertDel)) { workoutData[selectedDateString].splice(idx, 1); updateAndSync(); } }

        function renderPRs() {
            const c = document.getElementById('pr-list-container'); c.innerHTML = ''; const s = [...prDataList].sort((a, b) => new Date(b.date) - new Date(a.date));
            if(s.length===0) return;
            s.forEach(pr => {
                const idx = prDataList.findIndex(item => item === pr);
                c.innerHTML += `<div class="pr-item"><div class="pr-item-content" onclick="openPRModal(${idx})"><div class="pr-header"><span>${pr.type}</span><span class="pr-record-val">${pr.record}</span></div><div class="pr-date">${pr.date}</div></div><button class="btn-icon-delete" onclick="deletePRDirect(${idx}, event)"><span class="material-icons">delete</span></button></div>`;
            });
        }

        function openPRModal(idx) { currentPrIndex = idx; if(idx > -1) { const pr = prDataList[idx]; document.getElementById('pr-input-date').value = pr.date; document.getElementById('pr-input-type').value = pr.type; document.getElementById('pr-input-record').value = pr.record; } else { document.getElementById('pr-input-date').value = new Date().toISOString().split('T')[0]; document.getElementById('pr-input-type').value = ''; document.getElementById('pr-input-record').value = ''; } document.getElementById('pr-modal').classList.add('active'); }
        
        function savePR() {
            let date = document.getElementById('pr-input-date').value, type = document.getElementById('pr-input-type').value.trim(), record = document.getElementById('pr-input-record').value.trim();
            if(!type || !record) return; if(!date) date = new Date().toISOString().split('T')[0];
            const newPR = { date, type, record }; if(currentPrIndex === -1) prDataList.push(newPR); else prDataList[currentPrIndex] = newPR;
            closeModal('pr-modal'); updateAndSync();
        }
        function deletePRDirect(idx, e) { e.stopPropagation(); if(confirm(i18n[currentLang].alertDel)) { prDataList.splice(idx, 1); updateAndSync(); } }
        function calc1RM(val) { const w = parseFloat(val); const d = document.getElementById('calc-result'); if(!w) { d.innerHTML = ''; return; } let h = ''; [95, 90, 85, 80, 75, 65, 55, 50].forEach(p => h += `<div><span style="color:#aaa; font-size:0.8rem;">${p}%</span><br><strong>${(w * p / 100).toFixed(1)}</strong></div>`); d.innerHTML = h; }

        function renderTimerPlan() {
            const todayStr = new Date().toISOString().split('T')[0]; const c = document.getElementById('timer-today-plan'); const recs = workoutData[todayStr] || [];
            let html = `<div class="today-plan-header"><span class="material-icons">assignment</span> ${i18n[currentLang].todayPlanTitle}</div>`;
            if (recs.length === 0) html += `<p style="text-align:center; color:#aaa;">${i18n[currentLang].noPlanToday}</p>`;
            else recs.forEach(r => { html += `<div class="today-plan-item"><div class="tp-title">${r.type} ${r.name?'- '+r.name:''}</div></div>`; });
            c.innerHTML = html;
        }

        // ==========================================
        // 3. 타이머 & 라운드 체커 로직
        // ==========================================
        let currentWodRound = 0;
        function addRound() { currentWodRound++; document.getElementById('wod-round-count').innerText = currentWodRound; }
        function subRound() { if(currentWodRound > 0) { currentWodRound--; document.getElementById('wod-round-count').innerText = currentWodRound; } }
        function resetRoundCount() { currentWodRound = 0; document.getElementById('wod-round-count').innerText = currentWodRound; }

        let timerInterval, timeInSeconds = 0, isTimerRunning = false, intervalState = { currentRound: 1, totalRounds: 5, isWorkPhase: true, workSec: 40, restSec: 20 };
        function changeTimerMode() {
            const t = document.getElementById('timer-type').value; document.getElementById('timer-setting-down').style.display = t==='down'?'flex':'none'; document.getElementById('timer-setting-interval').style.display = t==='interval'?'flex':'none'; resetTimerUI();
            if(t==='down') timeInSeconds = (parseInt(document.getElementById('t-down-min').value)||0)*60 + (parseInt(document.getElementById('t-down-sec').value)||0);
            else if(t==='interval') { intervalState.workSec = parseInt(document.getElementById('t-int-work').value)||40; intervalState.restSec = parseInt(document.getElementById('t-int-rest').value)||20; intervalState.totalRounds = parseInt(document.getElementById('t-int-round').value)||5; intervalState.currentRound=1; intervalState.isWorkPhase=true; timeInSeconds=intervalState.workSec; document.getElementById('timer-phase-text').innerText = `Round 1 / ${intervalState.totalRounds} - READY`; } else timeInSeconds = 0; updateTimerDisplay();
        }
        function updateTimerDisplay() { document.getElementById('timer-display').innerText = `${String(Math.floor(timeInSeconds / 60)).padStart(2, '0')}:${String(timeInSeconds % 60).padStart(2, '0')}`; }
        function resetTimerUI() { clearInterval(timerInterval); isTimerRunning = false; document.getElementById('btn-timer-start').style.display = 'block'; document.getElementById('btn-timer-stop').style.display = 'none'; document.getElementById('timer-box').className = 'timer-container'; document.getElementById('timer-phase-text').innerText = ''; }
        function startTimer() { if (isTimerRunning) return; const t = document.getElementById('timer-type').value; if (timeInSeconds === 0 && t === 'down') timeInSeconds = (parseInt(document.getElementById('t-down-min').value)||0)*60 + (parseInt(document.getElementById('t-down-sec').value)||0); isTimerRunning = true; document.getElementById('btn-timer-start').style.display = 'none'; document.getElementById('btn-timer-stop').style.display = 'block'; timerInterval = setInterval(() => { if (t === 'up') timeInSeconds++; else if (t === 'down') { timeInSeconds--; if (timeInSeconds <= 0) { resetTimerUI(); timeInSeconds = 0; alert("END!"); } } else if (t === 'interval') { timeInSeconds--; if (timeInSeconds <= 0) { if (intervalState.isWorkPhase && intervalState.restSec > 0) { intervalState.isWorkPhase = false; timeInSeconds = intervalState.restSec; document.getElementById('timer-phase-text').innerText = `REST`; } else { intervalState.currentRound++; if (intervalState.currentRound > intervalState.totalRounds) { resetTimerUI(); alert('END!'); return; } intervalState.isWorkPhase = true; timeInSeconds = intervalState.workSec; document.getElementById('timer-phase-text').innerText = `WORK`; } } } updateTimerDisplay(); }, 1000); }
        function stopTimer() { resetTimerUI(); } function resetTimer() { resetTimerUI(); changeTimerMode(); }

        // ==========================================
        // 4. 수파베이스 (서버 통신 & 로그인) 로직
        // ==========================================
        const { createClient } = supabase;
        const supabaseClient = createClient('https://ngenrfzcocnusrvbuupb.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nZW5yZnpjb2NudXNydmJ1dXBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTY1MTcsImV4cCI6MjA4ODgzMjUxN30.vNmP_ORgKgrVuM77wBFBHfCLw-gWaV9LuUqMq7o0rpw');

        async function signUpUser() { const e=document.getElementById('auth-email').value, p=document.getElementById('auth-password').value; if(!e||p.length<6) return alert("입력 확인"); const {error} = await supabaseClient.auth.signUp({email:e, password:p}); if(error) alert(error.message); else alert("가입 완료"); }
        async function loginUser() { const e=document.getElementById('auth-email').value, p=document.getElementById('auth-password').value; const {error} = await supabaseClient.auth.signInWithPassword({email:e, password:p}); if(error) alert("로그인 실패"); }
        async function logoutUser() { await supabaseClient.auth.signOut(); window.location.reload(); }

        async function syncDataToCloud() {
            if(!currentUser) return;
            await supabaseClient.from('user_data').upsert({ user_id: currentUser.id, workout_data: workoutData, pr_data: prDataList });
        }

        function updateAndSync() { syncDataToCloud(); renderAll(); if(document.getElementById('modal-list-view').style.display === 'block') renderWorkoutList(); }

        function deleteAllData() { if(confirm("초기화 하시겠습니까?")) { workoutData={}; prDataList=[]; updateAndSync(); } }

        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            if (session && session.user) {
                currentUser = session.user;
                document.getElementById('login-overlay').classList.add('hidden');
                const { data } = await supabaseClient.from('user_data').select('*').eq('user_id', currentUser.id).single();
                if (data) { workoutData = data.workout_data || {}; prDataList = data.pr_data || []; }
                applyLanguage(); renderAll(); changeTimerMode();
            } else {
                currentUser = null; document.getElementById('login-overlay').classList.remove('hidden'); workoutData = {}; prDataList = [];
            }
        });

    </script>
</body>
